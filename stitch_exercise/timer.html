<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chrono Entraînement</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "work-bg": "#10b981", // Emerald 500
                        "work-text": "#ffffff",
                        "rest-bg": "#3b82f6", // Blue 500
                        "rest-text": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    fontSize: {
                        "massive": "12rem",
                    }
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-work-bg text-work-text font-display antialiased overflow-hidden h-screen flex flex-col transition-colors duration-500 ease-in-out">
<div class="flex items-center justify-between p-6 z-10">
<div class="flex flex-col">
<h2 class="text-white/90 text-sm font-semibold tracking-wider uppercase">Chrono Entraînement</h2>
<span class="text-white/70 text-xs">Work Interval</span>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-colors size-10 backdrop-blur-sm">
<span class="material-symbols-outlined text-2xl text-white">volume_up</span>
</button>
</div>
</div>
<main class="flex-1 flex flex-col items-center justify-center w-full px-4 overflow-hidden relative">
<div class="text-center z-10 w-full mb-4">
<h1 class="text-white text-4xl md:text-5xl font-extrabold tracking-tight leading-tight drop-shadow-md">
                Shadow Footwork
            </h1>
<p class="text-white/80 text-xl font-medium mt-2">Group 2 - Speed</p>
</div>
<div class="flex justify-center items-center py-2 z-10 w-full">
<div class="tabular-nums font-black text-[10rem] sm:text-[14rem] leading-none tracking-tighter drop-shadow-lg select-none">
                45
            </div>
</div>
<p class="text-white/60 text-lg font-medium uppercase tracking-[0.2em] mb-8">Seconds</p>
<div class="absolute inset-0 pointer-events-none opacity-10 flex items-center justify-center">
<span class="material-symbols-outlined text-[30rem]">timer</span>
</div>
</main>
<footer class="w-full px-8 pb-12 pt-4 z-20">
<div class="flex items-center justify-center gap-6 max-w-sm mx-auto w-full">
<button class="flex-1 h-20 rounded-2xl bg-white text-work-bg hover:bg-gray-100 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-3xl filled" style="font-variation-settings: 'FILL' 1;">stop_circle</span>
<span class="text-xl font-bold uppercase tracking-wide">Stop</span>
</button>
<button class="flex-1 h-20 rounded-2xl bg-black/20 text-white backdrop-blur-md border border-white/20 hover:bg-black/30 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="text-xl font-bold uppercase tracking-wide">Passer</span>
<span class="material-symbols-outlined text-3xl">skip_next</span>
</button>
</div>
</footer>

</body></html>
